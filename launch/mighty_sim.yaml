session_name: mighty_sim
windows:
  - window_name: main
    layout: tiled
    shell_command_before:
    - |
      if [ -z "$SETUP_BASH" ] || [ ! -f "$SETUP_BASH" ]; then
        echo "[ERROR] SETUP_BASH is missing or invalid: $SETUP_BASH" >&2
        exit 1
      fi
      . "$SETUP_BASH"
    - export ROS_DOMAIN_ID=7
    
    panes:
      # base station
      - shell_command:
        - ros2 launch mighty simulator.launch.py

      # NX01  (10.000,  0.000) -> yaw = -180 deg (equivalently 180)
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX01 x:=10.000 y:=0.000 z:=1.0 yaw:=-180.0

      # NX02  ( 8.090,  5.878) -> yaw = -144 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX02 x:=8.090 y:=5.878 z:=1.0 yaw:=-144.0

      # NX03  ( 3.090,  9.511) -> yaw = -108 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX03 x:=3.090 y:=9.511 z:=1.0 yaw:=-108.0

      # NX04  (-3.090,  9.511) -> yaw = -72 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX04 x:=-3.090 y:=9.511 z:=1.0 yaw:=-72.0

      # NX05  (-8.090,  5.878) -> yaw = -36 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX05 x:=-8.090 y:=5.878 z:=1.0 yaw:=-36.0

      # NX06  (-10.000,  0.000) -> yaw = 0 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX06 x:=-10.000 y:=0.000 z:=1.0 yaw:=0.0

      # NX07  (-8.090, -5.878) -> yaw = 36 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX07 x:=-8.090 y:=-5.878 z:=1.0 yaw:=36.0

      # NX08  (-3.090, -9.511) -> yaw = 72 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX08 x:=-3.090 y:=-9.511 z:=1.0 yaw:=72.0

      # NX09  ( 3.090, -9.511) -> yaw = 108 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX09 x:=3.090 y:=-9.511 z:=1.0 yaw:=108.0

      # NX10  ( 8.090, -5.878) -> yaw = 144 deg
      - shell_command:
        - sleep 10
        - ros2 launch mighty onboard_mighty.launch.py namespace:=NX10 x:=8.090 y:=-5.878 z:=1.0 yaw:=144.0

      # goal monitor (spawns GoalMonitorNode for NX01..NX08)
      - shell_command:
        - sleep 20
        - ros2 launch mighty goal_monitor.launch.py



