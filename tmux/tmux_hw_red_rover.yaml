session_name: docker_hardware_ground_robot
# Usage:
#   ODOM_TYPE=dlio tmuxp load tmux_hw_red_rover.yaml     # (default) uses DLIO for localization
#   ODOM_TYPE=mocap tmuxp load tmux_hw_red_rover.yaml    # uses mocap (world + mocap/twist topics)
windows:
  - window_name: main
    layout: tiled
    shell_command_before:
      - source /opt/ros/humble/setup.bash
      - source /home/swarm/.bashrc
      - export ODOM_TYPE=${ODOM_TYPE:-dlio}
    panes:
      # Onboard mighty
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - source /home/swarm/code/decomp_ws/install/setup.bash
        - 'if [ "$ODOM_TYPE" = "mocap" ]; then ros2 launch mighty onboard_mighty.launch.py x:=0.0 y:=0.0 z:=0.0 yaw:=0.0 namespace:=$ROVER_NAME use_hardware:=true use_obstacle_tracker:=false use_onboard_localization:=false robot_type:=red_rover depth_camera_name:=d455 twist_topic:=mocap/twist; else ros2 launch mighty onboard_mighty.launch.py x:=0.0 y:=0.0 z:=0.0 yaw:=0.0 namespace:=$ROVER_NAME use_hardware:=true use_obstacle_tracker:=false use_onboard_localization:=true robot_type:=red_rover depth_camera_name:=d455; fi'

      # Livox
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch livox_ros_driver2 run_MID360_launch.py namespace:=$ROVER_NAME

      # DLIO (only when using DLIO — mocap mode gets state from convert_vicon_to_state in mighty launch)
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - 'if [ "$ODOM_TYPE" = "mocap" ]; then echo "[INFO] Skipping DLIO (using mocap — state converter runs inside mighty launch)"; else ros2 launch direct_lidar_inertial_odometry dlio.launch.py namespace:=$ROVER_NAME; fi'

      # Republish rviz 2D goal to term goal
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 run mighty repub_rviz_2Dgoal.py

      # Static TF (lidar tilt)
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 run tf2_ros static_transform_publisher 0 0 0 0 0.3490659 0 $ROVER_NAME/base_link $ROVER_NAME/lidar

      # Global Mapper
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - 'if [ "$ODOM_TYPE" = "mocap" ]; then ros2 launch global_mapper_ros global_mapper_node.launch.py hardware:=true quad:="$ROVER_NAME" depth_pointcloud_topic:="livox/lidar" pose_topic:="world" pose_type:="pose_stamped"; else ros2 launch global_mapper_ros global_mapper_node.launch.py hardware:=true quad:="$ROVER_NAME" depth_pointcloud_topic:="livox/lidar" pose_topic:="dlio/odom_node/pose"; fi'

      # MPC Controller
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch mpc mpc.launch.py namespace:=$ROVER_NAME hardware:=true params_file:=/home/swarm/code/mighty_ws/src/mpc/config/mpc.yaml
